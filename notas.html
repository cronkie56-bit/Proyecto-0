<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Notas</title>

<style>
body{
    margin:0;
    background:#0b0b0b;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* ☰ */
.menu-icon{
    position:fixed;
    top:20px;
    left:20px;
    font-size:28px;
    cursor:pointer;
    color:#c77dff;
    text-shadow:0 0 10px #c77dff;
    z-index:50;
}

/* PANEL */
.side-panel{
    position:fixed;
    top:0;
    left:0;
    width:260px;
    height:100%;
    background:#111;
    box-shadow:0 0 25px #c77dff;
    border-radius:0 0 15px 0;
    padding:20px;
    z-index:40;

    transform:translateX(-100%);
    opacity:0;
    pointer-events:none;

    transition:transform .4s ease, opacity .3s ease;
}

.side-panel.active{
    transform:translateX(0);
    opacity:1;
    pointer-events:auto;
}

/* BOTONES PANEL */
.panel-btn{
    display:block;
    width:100%;
    margin:15px 0;
    padding:12px;
    background:#000;
    border:none;
    color:white;
    cursor:pointer;
    border-radius:20px;
    box-shadow:0 0 10px #c77dff;
    transition:.3s;
}

.panel-btn:hover{
    background:#1a1a1a;
    box-shadow:0 0 20px #c77dff;
}

/* LOGOUT */
#logout{
    position:fixed;
    top:20px;
    right:20px;
    padding:8px 15px;
    background:#111;
    border:1px solid #555;
    color:white;
    cursor:pointer;
    border-radius:0;
    box-shadow:0 0 10px red;
}

#logout:hover{
    background:red;
    box-shadow:0 0 20px red;
}

/* CONTENIDO */
.container{
    display:flex;
    flex-direction:column;
    align-items:center;
    margin-top:90px;
    padding:20px;
}

/* TEXTAREA */
textarea{
    width:90%;
    max-width:700px;
    height:120px;
    background:#000;
    border:none;
    border-radius:20px;
    color:white;
    padding:15px;
    resize:none;
    box-shadow:0 0 15px #c77dff;
    margin-bottom:15px;
}

/* BOTÓN */
.add-btn{
    background:#000;
    border:none;
    color:white;
    padding:12px 25px;
    border-radius:20px;
    cursor:pointer;
    box-shadow:0 0 10px #c77dff;
    transition:.3s;
}

.add-btn:hover{
    box-shadow:0 0 20px #c77dff;
}

/* ICONOS NOTAS */
#listaNotas{
    width:90%;
    display:flex;
    flex-wrap:wrap;
    gap:20px;
    justify-content:center;
    margin-top:30px;
}

.note-icon{
    width:130px;
    height:130px;
    background:#111;
    border-radius:25px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    cursor:pointer;
    box-shadow:0 0 15px #c77dff;
    transition:.3s;
    position:relative;
}

.note-icon:hover{
    transform:scale(1.05);
    box-shadow:0 0 25px #c77dff;
}

.note-icon span{
    font-size:50px;
}

.note-icon p{
    margin-top:10px;
    text-align:center;
    padding:0 10px;
    color:#c77dff;
}

/* BORRAR */
.delete-btn{
    position:absolute;
    top:8px;
    right:8px;
    width:25px;
    height:25px;
    border:none;
    border-radius:50%;
    background:#000;
    color:#ff003c;
    cursor:pointer;
    box-shadow:0 0 10px #ff003c;
}

.delete-btn:hover{
    background:#ff003c;
    color:black;
}

/* MODAL */
.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:100;
}

.modal-content{
    width:80%;
    max-width:700px;
    background:#111;
    padding:25px;
    border-radius:25px;
    box-shadow:0 0 25px #c77dff;
    position:relative;
}

.modal-content h2{
    color:#c77dff;
    text-shadow:0 0 10px #c77dff;
}

.close-modal{
    position:absolute;
    top:15px;
    right:15px;
    background:#000;
    border:none;
    color:#ff003c;
    width:30px;
    height:30px;
    border-radius:50%;
    cursor:pointer;
    box-shadow:0 0 10px #ff003c;
}
</style>
</head>

<body>

<!-- ☰ -->
<div class="menu-icon" id="menuIcon">☰</div>

<!-- PANEL -->
<div class="side-panel" id="panel">

    <button class="panel-btn"
    onclick="window.location.href='bienvenido.html'">
        🏠 Inicio
    </button>

    <button class="panel-btn"
    onclick="window.location.href='notas.html'">
        📝 Notas
    </button>

    <button class="panel-btn"
    onclick="window.location.href='mensajes.html'">
        💬 Mensajes
    </button>

</div>

<!-- LOGOUT -->
<button id="logout">Cerrar sesión</button>

<!-- CONTENIDO -->
<div class="container">

    <h1 style="
        color:#c77dff;
        text-shadow:0 0 15px #c77dff;
    ">
        📝 Notas de <span id="usuario"></span>
    </h1>

    <textarea id="notaInput"
    placeholder="Escribe una nota..."></textarea>

    <button class="add-btn"
    onclick="agregarNota()">
        Guardar Nota
    </button>

    <div id="listaNotas"></div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">

    <div class="modal-content">

        <button class="close-modal"
        onclick="cerrarNota()">
            ✕
        </button>

        <h2 id="modalTitulo"></h2>

        <div id="modalTexto"></div>

    </div>

</div>

<script>
// SESIÓN
const usuario =
localStorage.getItem("usuario");

if(!usuario){

    window.location.href="index.html";
}

document.getElementById("usuario")
.textContent = usuario;

/* PANEL */
const panel =
document.getElementById("panel");

const menuIcon =
document.getElementById("menuIcon");

menuIcon.onclick = ()=>{

    panel.classList.add("active");

    menuIcon.style.display = "none";
};

document.addEventListener("click",(e)=>{

    if(
        panel.classList.contains("active") &&
        !panel.contains(e.target) &&
        e.target !== menuIcon
    ){

        panel.classList.remove("active");

        menuIcon.style.display = "block";
    }
});

/* LOGOUT */
document.getElementById("logout")
.onclick = ()=>{

    localStorage.removeItem("usuario");

    window.location.href="index.html";
};

/* NOTAS */
const notasKey = "notas_" + usuario;

/* CARGAR */
function cargarNotas(){

    const notas =
    JSON.parse(localStorage.getItem(notasKey)) || [];

    const cont =
    document.getElementById("listaNotas");

    cont.innerHTML = "";

    notas.forEach((n,i)=>{

        cont.innerHTML += `
        <div class="note-icon"
        onclick="abrirNota(${i})">

            <button class="delete-btn"
            onclick="event.stopPropagation(); borrarNota(${i})">
                ✕
            </button>

            <span>📁</span>

            <p>${n.titulo}</p>

        </div>
        `;
    });
}

/* AGREGAR */
function agregarNota(){

    const titulo =
    prompt("Nombre de la nota:");

    if(!titulo) return;

    const texto =
    document.getElementById("notaInput").value;

    if(!texto) return;

    const notas =
    JSON.parse(localStorage.getItem(notasKey)) || [];

    notas.push({
        titulo:titulo,
        texto:texto
    });

    localStorage.setItem(
        notasKey,
        JSON.stringify(notas)
    );

    document.getElementById("notaInput").value="";

    cargarNotas();
}

/* ABRIR */
function abrirNota(i){

    const notas =
    JSON.parse(localStorage.getItem(notasKey)) || [];

    document.getElementById("modalTitulo")
    .textContent = notas[i].titulo;

    document.getElementById("modalTexto")
    .textContent = notas[i].texto;

    document.getElementById("modal")
    .style.display = "flex";
}

/* CERRAR */
function cerrarNota(){

    document.getElementById("modal")
    .style.display = "none";
}

/* BORRAR */
function borrarNota(i){

    const notas =
    JSON.parse(localStorage.getItem(notasKey)) || [];

    notas.splice(i,1);

    localStorage.setItem(
        notasKey,
        JSON.stringify(notas)
    );

    cargarNotas();
}

/* INICIO */
cargarNotas();
</script>

</body>
</html>
