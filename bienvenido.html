<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenido</title>

<style>
body {
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    flex-direction: column;
    opacity: 0;
    transition: opacity 1s ease;
    overflow: hidden;
}

/* BOTONES */
.top-buttons {
    position: absolute;
    top: 20px;
    right: 20px;
}

button {
    margin-left: 10px;
    padding: 8px 15px;
    background: #111;
    border: 1px solid #555;
    color: white;
    cursor: pointer;
    transition: all 0.3s ease;
}

/* Hover rojo (cerrar sesión) */
#logout:hover {
    background: red;
    box-shadow: 0 0 10px red;
}

/* Hover azul (guardar) */
#save:hover {
    background: blue;
    box-shadow: 0 0 10px blue;
}

/* TEXTO */
h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

/* EFECTO GLITCH SUAVE */
.glitch {
    position: relative;
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-1px, 1px); }
    40% { transform: translate(1px, -1px); }
    60% { transform: translate(-1px, -1px); }
    80% { transform: translate(1px, 1px); }
    100% { transform: translate(0); }
}

/* LÍNEAS DE FALLA */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 3px
    );
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    0% { opacity: 0.1; }
    50% { opacity: 0.2; }
    100% { opacity: 0.1; }
}
</style>

</head>
<body>

<!-- BOTONES -->
<div class="top-buttons">
    <button id="save">Guardar</button>
    <button id="logout" onclick="cerrarSesion()">Cerrar sesión</button>
</div>

<!-- MENSAJE -->
<h1 id="mensaje" class="glitch"></h1>

<script>
window.onload = () => {
    document.body.style.opacity = "1";

    const usuario = localStorage.getItem("usuario");

    if (usuario) {
        document.getElementById("mensaje").textContent = "Bienvenido " + usuario;
    } else {
        window.location.href = "login.html";
    }
};

// BOTÓN CERRAR SESIÓN
function cerrarSesion() {
    localStorage.removeItem("usuario");
    window.location.href = "login.html";
}

// BOTÓN GUARDAR (simulado)
document.getElementById("save").addEventListener("click", () => {
    alert("Progreso guardado (simulado)");
});
</script>

</body>
</html>
