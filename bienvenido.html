<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Bienvenido</title>

<style>
body {
    background: black;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    font-family: Arial;
    flex-direction: column;
    overflow: hidden;
    position: relative;
}

/* BOTONES SUPERIORES */
.top-buttons {
    position: absolute;
    top: 20px;
    right: 20px;
    display: flex;
}

button {
    margin-left: 10px;
    padding: 8px 15px;
    background: #111;
    border: 1px solid #555;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

/* HOVER */
#logout:hover { background: red; box-shadow: 0 0 10px red; }
#save:hover { background: blue; box-shadow: 0 0 10px blue; }

/* TEXTO */
h1 {
    font-size: 40px;
    letter-spacing: 2px;
}

/* GLITCH */
.glitch {
    animation: glitch 2s infinite;
}

@keyframes glitch {
    0% { transform: translate(0); }
    20% { transform: translate(-2px, 2px); }
    40% { transform: translate(2px, -2px); }
    60% { transform: translate(-2px, -2px); }
    80% { transform: translate(2px, 2px); }
    100% { transform: translate(0); }
}

/* LÍNEAS DE FONDO */
body::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: repeating-linear-gradient(
        transparent,
        transparent 2px,
        rgba(255,255,255,0.03) 3px
    );
    animation: flicker 0.2s infinite;
}

@keyframes flicker {
    0% { opacity: 0.1; }
    50% { opacity: 0.2; }
    100% { opacity: 0.1; }
}

/* ICONO ☰ PANEL LATERAL */
#menu-btn {
    position: absolute;
    top: 20px;
    left: 20px;
    font-size: 30px;
    background: none;
    border: none;
    color: #b466ff;
    cursor: pointer;
    z-index: 1000;
    transition: 0.3s;
}
#menu-btn:hover {
    text-shadow: 0 0 10px #b466ff, 0 0 20px #b466ff;
}

/* PANEL LATERAL */
#side-panel {
    position: fixed;
    top: 0;
    left: -250px;
    width: 250px;
    height: 100%;
    background: rgba(20,0,30,0.95);
    border-right: 1px solid #b466ff;
    box-shadow: 0 0 20px #b466ff;
    padding-top: 60px;
    transition: 0.4s;
    z-index: 900;
}

/* LINKS DEL PANEL */
#side-panel a {
    display: block;
    color: #b466ff;
    padding: 15px 25px;
    text-decoration: none;
    font-size: 18px;
    transition: 0.3s;
    text-shadow: 0 0 5px #b466ff;
}

/* HOVER DE LINKS */
#side-panel a:hover {
    background: rgba(180,102,255,0.1);
    box-shadow: 0 0 10px #b466ff;
}
</style>

</head>
<body>

<!-- ICONO ☰ PANEL -->
<button id="menu-btn">☰</button>

<!-- PANEL LATERAL -->
<div id="side-panel">
    <a href="#" id="link-notas">📒 Notas</a>
    <a href="#" id="link-mensajes">✉️ Mensajes</a>
</div>

<!-- BOTONES SUPERIORES -->
<div class="top-buttons">
    <button id="save">Guardar</button>
    <button id="logout">Cerrar sesión</button>
</div>

<!-- MENSAJE -->
<h1 id="mensaje" class="glitch"></h1>

<script>
// MOSTRAR USUARIO
const usuario = localStorage.getItem("usuario");

if (usuario) {
    document.getElementById("mensaje").textContent = "Bienvenido " + usuario;
} else {
    window.location.href = "index.html";
}

// 🔥 CERRAR SESIÓN
document.getElementById("logout").addEventListener("click", () => {
    localStorage.removeItem("usuario");
    window.location.href = "index.html";
});

// BOTÓN GUARDAR
document.getElementById("save").addEventListener("click", () => {
    alert("Progreso guardado");
});

// PANEL LATERAL
const menuBtn = document.getElementById("menu-btn");
const sidePanel = document.getElementById("side-panel");
let panelOpen = false;

menuBtn.addEventListener("click", () => {
    if (!panelOpen) {
        sidePanel.style.left = "0";
    } else {
        sidePanel.style.left = "-250px";
    }
    panelOpen = !panelOpen;
});

// REDIRECCIONAR LINKS
document.getElementById("link-notas").addEventListener("click", () => {
    if(usuario) window.location.href = "notas.html";
});
document.getElementById("link-mensajes").addEventListener("click", () => {
    if(usuario) window.location.href = "mensajes.html";
});
</script>

</body>
</html>
